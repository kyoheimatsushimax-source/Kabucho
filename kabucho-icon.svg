<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="115" fill="#16324f"/>
  
  <!-- 影 -->
  <rect x="134" y="100" width="260" height="336" rx="16" fill="#0a1a30" opacity="0.55"/>
  <!-- 帳面本体（重なりページ） -->
