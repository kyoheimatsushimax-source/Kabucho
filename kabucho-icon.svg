  <circle cx="210" cy="118" r="10" fill="#16324f"/>
  <path d="M162 118 Q186 58 210 118" fill="none" stroke="#c73e3a" stroke-width="11" stroke-linecap="round"/>
  <path d="M186 88 Q176 108 168 132" fill="none" stroke="#c73e3a" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <!-- 題箋（縦書き 株帳） -->
  <rect x="216" y="146" width="72" height="204" rx="7" fill="#ffffff" stroke="#d9cfb4" stroke-width="3"/>
  <text x="252" y="222" text-anchor="middle" font-family="Noto Serif CJK JP,Hiragino Mincho ProN,Yu Mincho,serif" font-weight="900" font-size="62" fill="#22252a">株</text>
  <text x="252" y="316" text-anchor="middle" font-family="Noto Serif CJK JP,Hiragino Mincho ProN,Yu Mincho,serif" font-weight="900" font-size="62" fill="#22252a">帳</text>
  <!-- 上昇チャート＋陽線 -->
  <polyline points="146,394 196,368 238,378 292,338" fill="none" stroke="#c73e3a" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="330" y1="284" x2="330" y2="382" stroke="#c73e3a" stroke-width="10" stroke-linecap="round"/>
  <rect x="314" y="300" width="32" height="62" rx="7" fill="#c73e3a"/>

</svg>